name: CI

# Structure references the official MoonBit community workflow template:
#   https://github.com/moonbit-community/.github/blob/main/workflow-templates/check.yml
# (cross-platform matrix, persist-credentials:false, `moon update`, lint via
#  `moon fmt`/`moon info` + `git diff --exit-code`).
#
# On top of the template we additionally enforce the 大赛验收标准5 requirement
# that CI must cover 检查 / 构建 / 测试 (check / build / test), all with warnings
# treated as errors (`--deny-warn`).
#
# NOTE: on toolchain 0.10.3 `moon info` does NOT accept `--deny-warn` (that flag
# is only valid for check / build / test); the "deny warnings" guarantee for the
# interface step is covered by `moon check --deny-warn`, while `moon info` here
# only verifies the public interface is complete and does not dirty the tree.

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install MoonBit (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          # Prefer the official endpoint; fall back to the China mirror if the
          # primary one is unreachable.
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash || curl -fsSL https://cli.moonbitlang.cn/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: post install
        run: |
          moon version --all
          moon update

      # ---- 验收标准5: 检查 / 构建 / 测试 (all --deny-warn) ----
      - name: moon check --deny-warn
        run: moon check --deny-warn

      - name: moon build --deny-warn
        run: moon build --deny-warn

      - name: moon test --deny-warn
        run: moon test --deny-warn

      # ---- lint: formatting + public interface completeness ----
      - name: moon fmt --check
        run: moon fmt --check

      - name: moon info (interface completeness)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          moon info
          # `moon info` must not dirty the tree (generated .mbti is gitignored).
          git diff --exit-code
