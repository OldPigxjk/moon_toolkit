name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://moonbitlang.com/install/moonbit-install.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check
        run: moon check

      - name: Build
        run: moon build

      - name: Test
        run: moon test
